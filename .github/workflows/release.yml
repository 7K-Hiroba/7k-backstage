name: Release

on:
  push:
    branches: [main]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: 7K-Group/workflows-library/.github/workflows/release-please.yml@v1
    secrets: inherit

  version:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.manifest.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version from manifest
        id: manifest
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

  publish:
    needs: [release-please, version]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: 7K-Group/workflows-library/.github/workflows/release-app.yml@v1
    with:
      path: .
      version: ${{ needs.version.outputs.version }}
      image-name: backstage-app
    secrets: inherit

  latest:
    needs: publish
    permissions:
      contents: read
      id-token: write
    uses: 7K-Group/workflows-library/.github/workflows/promote.yml@v1
    with:
      image: backstage-app
      digest: ${{ needs.publish.outputs.digest }}
      tags: latest
      sign: false
    secrets: inherit
