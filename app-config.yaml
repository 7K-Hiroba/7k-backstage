app:
  title: CNOE
  baseUrl: http://localhost:3000
  packages: all
  listen:
    port: 3000
    host: 0.0.0.0

organization:
  name: CNOE

# Per-client feature flags (frontend). All default to true when unset.
# Override per client in an app-config overlay (e.g. app-config.client-a.yaml)
# or via env vars, e.g. APP_CONFIG_features__techRadar=false
#   search:        /search page + sidebar search
#   apiDocs:       /api-docs page, sidebar APIs, entity API tabs
#   techDocs:      /docs pages, sidebar Docs, entity Docs tabs
#   scaffolder:    /create pages + sidebar Create
#   techRadar:     /tech-radar page + sidebar item
#   catalogGraph:  /catalog-graph page, sidebar Graph, entity graph cards
#   catalogImport: /catalog-import page
#   kubernetes:    entity Kubernetes tabs
#   kro:           entity Kro tabs/cards
#   argoWorkflows: entity CI/CD tab (Argo Workflows)
#   argocd:        entity overview Argo CD card
#   agentForge:    CAIPE Agent Forge chat assistant (requires agentForge.baseUrl)
# NOTE: backend plugins are gated separately via FEATURE_* env vars
# (FEATURE_TECHDOCS, FEATURE_SCAFFOLDER, FEATURE_SEARCH, FEATURE_KUBERNETES,
# FEATURE_KRO) — set them to false alongside the matching flags here.
features:
  search: true
  apiDocs: true
  techDocs: true
  scaffolder: true
  techRadar: true
  catalogGraph: true
  catalogImport: true
  kubernetes: true
  kro: true
  argoWorkflows: true
  argocd: true
  agentForge: true

# CAIPE Agent Forge (AI chat assistant) — points to a running CAIPE instance.
# See https://github.com/cnoe-io/ai-platform-engineering for deployment options.
agentForge:
  baseUrl: http://127.0.0.1:8000
  # showOptions: true # display pre-defined options based on agent skills

homepage:
  quickLinks:
    - url: /catalog
      label: Catalog
      icon: catalog
    - url: https://gitlab.com
      label: GitLab
      iconUrl: /img/gitlab.png
    - url: /argocd
      label: ArgoCD
      iconUrl: /img/argocd.png
    - url: /argo-workflows
      label: Argo Workflows
      iconUrl: /img/argo-workflows.png
    - url: /
      label: Kargo
      iconUrl: /img/kargo.png
    - url: /keycloak
      label: Keycloak
      iconUrl: /img/keycloak.png

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  # auth:
  #   keys:
  #     - secret: ${BACKEND_SECRET}
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    host: 0.0.0.0
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:7007
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

integrations:
  gitea:
    - baseUrl: https://cnoe.localtest.me:8443/gitea
      host: cnoe.localtest.me:8443
      username: giteaAdmin
      password: ${GITEA_PASSWORD}
    - baseUrl: https://cnoe.localtest.me/gitea
      host: cnoe.localtest.me
      username: giteaAdmin
      password: ${GITEA_PASSWORD}

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: local # set this to development to enable SSO
  # Keep the `ent` ownership claim in issued user tokens (defaults to true
  # since Backstage 1.50). Our custom OIDC resolvers rely on it.
  # TODO: upstream will remove this setting in a future release; migrate
  # ownership lookups to the userInfo core service before then.
  omitIdentityTokenOwnershipClaim: false
  session:
    secret: abcdfkjalskdfjkla
  providers:
    guest: {}
    keycloak-oidc:
      development:
        metadataUrl: https://cnoe.localtest.me:8443/keycloak/realms/cnoe/.well-known/openid-configuration
        clientId: backstage
        clientSecret: ${KEYCLOAK_CLIENT_SECRET}
        prompt: auto

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options
  defaultAuthor:
    name: backstage-scaffolder
    email: noreply
  defaultCommitMessage: 'backstage scaffolder'

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
    # Allow Kro ResourceGroup entities (they appear as Components with type 'kro-resource-group')
    - allow: [Component]
      spec:
        type: kro-resource-group
  locations:
    # Local example data
    - type: file
      target: ../../examples/entities.yaml
      rules:
        - allow: [Component, System, API, Resource, Location]
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/k8s-apply/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/k8s-apply/template-manifest-object.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/k8s-apply/template-manifest-string.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/local-stack/mock-entities/catalog-info.yaml
      rules:
        - allow:
            [Component, System, API, Resource, Location, Template, Group, User]
    - type: url
      target: https://cnoe.localtest.me:8443/gitea/giteaAdmin/idpbuilder-localdev-backstage-templates-entities/src/branch/main/catalog-info.yaml

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - url: https://127.0.0.1:33277
          name: local
          authProvider: 'serviceAccount'
          skipTLSVerify: true
          serviceAccountToken: eyJhbG......
          # Additional configuration for Kro resources
          customResources:
            - group: 'kro.run'
              apiVersion: 'v1alpha1'
              plural: 'resourcegraphdefinitions'
            - group: 'kro.run'
              apiVersion: 'v1alpha1'
              plural: 'cicdpipelines'
            - group: 'kro.run'
              apiVersion: 'v1alpha1'
              plural: 'eksclusters'
            - group: 'kro.run'
              apiVersion: 'v1alpha1'
              plural: 'eksclusterwithvpcs'
            - group: 'kro.run'
              apiVersion: 'v1alpha1'
              plural: 'vpcs'

argocd:
  appLocatorMethods:
    - type: 'config'
      instances:
        - name: local
          url: https://cnoe.localtest.me:8443/argocd
          username: admin
          password: ${ARGOCD_ADMIN_PASSWORD}

argoWorkflows:
  baseUrl: https://cnoe.localtest.me:8443/argo-workflows

kubernetesIngestor:
  # Kro ResourceGraphDefinition + instance ingestion.
  # NOTE: kept disabled intentionally; set kro.enabled to true to start
  # ingesting RGDs and Kro instances as catalog entities.
  kro:
    enabled: false
    rgds:
      enabled: true
      ingestAllRGDs: true
      taskRunner:
        frequency: 300 # 5 minutes in seconds
    instances:
      ingestAllInstances: true
  # Standard Kubernetes workload ingestion (components.*) intentionally left
  # at plugin defaults. To restrict ingestion to annotated resources only,
  # set components.onlyIngestAnnotatedResources: true.
  # Clusters are discovered from the standard kubernetes.clusterLocatorMethods
  # config section (the old kubernetesIngestor.clusters key no longer exists).

# Kro plugin configuration for ResourceGroup management
kro:
  enablePermissions: true
  enableAuditLogging: true

  # Security configuration
  rbacValidation:
    enabled: true
    strictMode: false
    cacheTimeout: 300 # 5 minutes

  auditLogging:
    enabled: true
    logLevel: 'info'
    includeSuccessEvents: true

  errorHandling:
    enableDetailedErrors: true
    includeStackTrace: false

  clusters:
    - name: local
      url: https://127.0.0.1:33277
      authProvider: 'serviceAccount'
      serviceAccountToken: eyJhbG......
      skipTLSVerify: true
      rbac:
        requiredPermissions:
          - apiGroups: ['kro.run']
            resources: ['resourcegraphdefinitions']
            verbs:
              ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
          - apiGroups: ['kro.run']
            resources:
              ['cicdpipelines', 'eksclusters', 'eksclusterwithvpcs', 'vpcs']
            verbs:
              ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
          - apiGroups: ['']
            resources: ['events']
            verbs: ['get', 'list', 'watch']
        readOnlyPermissions:
          - apiGroups: ['kro.run']
            resources:
              [
                'resourcegraphdefinitions',
                'cicdpipelines',
                'eksclusters',
                'eksclusterwithvpcs',
                'vpcs',
              ]
            verbs: ['get', 'list', 'watch']

  # ResourceGroup entity processing configuration
  entityProcessing:
    enabled: true
    refreshInterval: 300
    namespaces: []
    labelSelectors: []

  # Integration with existing Kubernetes plugin
  integration:
    showInKubernetesViews: true
    enableRelationshipMapping: true

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  enabled: true
  enablePermissions: true
